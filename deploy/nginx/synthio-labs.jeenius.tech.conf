# Host-level nginx vhost for synthio-labs.jeenius.tech.
#
# Pattern:
#   Internet  ─https─▶  host nginx (TLS termination)
#                       ─http──▶  127.0.0.1:5173 (docker-compose frontend)
#                                  └─ /api + /ws proxied inside container ─▶ backend:9001
#
# Install:
#   sudo cp deploy/nginx/synthio-labs.jeenius.tech.conf \
#           /etc/nginx/sites-available/synthio-labs.jeenius.tech
#   sudo ln -s /etc/nginx/sites-available/synthio-labs.jeenius.tech \
#              /etc/nginx/sites-enabled/synthio-labs.jeenius.tech
#   sudo nginx -t && sudo systemctl reload nginx

upstream voiceslide_compose {
    server 127.0.0.1:5173;
    keepalive 32;
}

# ─── HTTP ─────────────────────────────────────────────────────────────────────
# Serves ACME HTTP-01 challenges (certbot webroot mode) and redirects
# everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name synthio-labs.jeenius.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ────────────────────────────────────────────────────────────────────
server {
    # Legacy ``listen ... http2`` syntax — works on nginx 1.10+ including the
    # versions Ubuntu 20.04 / 22.04 ship. The newer ``http2 on;`` directive
    # was only added in nginx 1.25.
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name synthio-labs.jeenius.tech;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Uploads (PDF / PPTX).
    client_max_body_size 25m;

    access_log /var/log/nginx/voiceslide.access.log;
    error_log  /var/log/nginx/voiceslide.error.log warn;

    # WebSocket realtime relay — upgrade headers + long timeouts.
    location /ws/ {
        proxy_pass         http://voiceslide_compose;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering    off;
    }

    # Everything else — SPA, /api/*, /healthz — goes through the compose frontend.
    location / {
        proxy_pass         http://voiceslide_compose;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Deck generation at Extensive density can take ~35s; keep in sync with
        # the timeouts declared inside the compose frontend nginx.conf.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
