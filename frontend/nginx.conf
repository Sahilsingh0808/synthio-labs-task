upstream voiceslide_backend {
    server backend:9001;
    keepalive 32;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow PDF / PPTX uploads (generator clamps at 20 MB worth of text).
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers — reasonable defaults.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HTTP Basic Auth — enabled at container start only when
    # BASIC_AUTH_USERNAME + BASIC_AUTH_PASSWORD are set in the environment.
    # The #AUTH_MARKER line below is rewritten by the entrypoint script.
    #AUTH_MARKER

    # WebSocket realtime relay.
    location /ws/ {
        proxy_pass         http://voiceslide_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Realtime sessions can idle on audio between bursts — keep them open.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # REST API.
    location /api/ {
        proxy_pass         http://voiceslide_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Deck generation can take 30-40s at Extensive density.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check passthrough — always unauthenticated so container / load
    # balancer health probes keep working regardless of BASIC_AUTH.
    location = /healthz {
        auth_basic off;
        proxy_pass http://voiceslide_backend;
        proxy_set_header Host $host;
    }

    # Static assets — aggressive cache.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
